version: '3.8'

services:
  db:
    image: postgres:15
    container_name: pati_db
    environment:
      POSTGRES_USER: chef
      POSTGRES_PASSWORD: pati_password
      POSTGRES_DB: pati_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pati_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://chef:pati_password@db:5432/pati_db
    depends_on:
      - db

volumes:
  postgres_data: