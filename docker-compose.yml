services:
  db:
    image: postgres:15
    container_name: pati_db
    environment:
      POSTGRES_USER: chef
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pati_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pati_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://chef:${POSTGRES_PASSWORD}@db:5432/pati_db
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      GMAIL_ADDRESS: ${GMAIL_ADDRESS:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    volumes:
      - pati_uploads:/app/static/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        EXPO_PUBLIC_BACKEND_URL: ${EXPO_PUBLIC_BACKEND_URL:-http://localhost:8000}
    container_name: pati_frontend
    environment:
      PORT: "8080"
    ports:
      - "8081:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
  pati_uploads: