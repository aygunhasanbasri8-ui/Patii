services:
  db:
    image: postgres:15
    container_name: pati_db
    environment:
      POSTGRES_USER: chef
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pati_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pati_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://chef:${POSTGRES_PASSWORD}@db:5432/pati_db
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    volumes:
      - pati_uploads:/app/static/uploads
    depends_on:
      - db

volumes:
  postgres_data:
  pati_uploads: